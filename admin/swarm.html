<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapleDevs | Swarm Intelligence Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent-primary: #00f2ff;
            --accent-secondary: #7000ff;
            --text-main: #e0e0e6;
            --text-dim: #9494a3;
            --success: #00ff88;
            --warning: #ffb800;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            background: radial-gradient(circle at 50% -20%, #1a1b2e 0%, #0a0b10 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo span {
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            backdrop-filter: blur(12px);
            transition: transform 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: rgba(0, 242, 255, 0.3);
            transform: translateY(-5px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .agent-info h3 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .agent-info p {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .agent-status {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .status-idle { background: rgba(148, 148, 163, 0.1); color: var(--text-dim); }
        .status-active { background: rgba(0, 255, 136, 0.1); color: var(--success); }
        .status-thinking { background: rgba(0, 242, 255, 0.1); color: var(--accent-primary); }

        .card-body {
            margin-bottom: 20px;
        }

        .activity-log {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            height: 80px;
            overflow-y: auto;
            color: var(--text-dim);
        }

        .activity-log::-webkit-scrollbar { width: 4px; }
        .activity-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .progress-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 15px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 2px;
            width: 0%;
            transition: width 1s ease;
        }

        .queue-section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
        }

        .queue-header {
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .queue-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .queue-item:last-child { border-bottom: none; }

        .queue-item-info h4 {
            font-size: 15px;
            margin-bottom: 4px;
        }

        .queue-item-info p {
            font-size: 13px;
            color: var(--text-dim);
        }

        .timestamp {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-dim);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 24px;
            text-align: center;
        }

        .stat-card h2 {
            font-size: 32px;
            margin-bottom: 4px;
            color: var(--accent-primary);
        }

        .stat-card p {
            font-size: 13px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .grid { grid-template-columns: 1fr; }
        }
    <script src="../swarm/state.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="../favicon.png" alt="" style="width: 32px; height: 32px;">
                MapleDevs <span>Swarm</span>
            </div>
            <div class="status-badge">
                <div class="pulse" id="system-status-dot"></div>
                <span id="system-status-text">System Operational</span>
            </div>
        </header>

        <div class="stats-grid" id="stats">
            <div class="stat-card">
                <h2 id="stat-jobs">0</h2>
                <p>Jobs Processed</p>
            </div>
            <div class="stat-card">
                <h2 id="stat-approved">0</h2>
                <h2 style="display:inline; font-size: 32px; color: var(--success);" id="stat-approved">0</h2>
                <p>Jobs Approved</p>
            </div>
            <div class="stat-card">
                <h2 id="stat-blogs">0</h2>
                <p>Articles Written</p>
            </div>
        </div>

        <div class="grid" id="agents-grid">
            <!-- Scout -->
            <div class="card" id="agent-scout">
                <div class="card-header">
                    <div class="agent-info">
                        <h3>Agent Scout</h3>
                        <p>Research & Intelligence</p>
                    </div>
                    <div class="agent-status status-idle">Idle</div>
                </div>
                <div class="card-body">
                    <div class="activity-log">Waiting for trigger...</div>
                </div>
                <div class="progress-bar"><div class="progress-fill"></div></div>
            </div>

            <!-- Reviewer -->
            <div class="card" id="agent-reviewer">
                <div class="card-header">
                    <div class="agent-info">
                        <h3>Agent Reviewer</h3>
                        <p>Gatekeeper & Quality Control</p>
                    </div>
                    <div class="agent-status status-idle">Idle</div>
                </div>
                <div class="card-body">
                    <div class="activity-log">Monitoring spreadsheet...</div>
                </div>
                <div class="progress-bar"><div class="progress-fill"></div></div>
            </div>

            <!-- Author -->
            <div class="card" id="agent-author">
                <div class="card-header">
                    <div class="agent-info">
                        <h3>Agent Author</h3>
                        <p>Content & Creative</p>
                    </div>
                    <div class="agent-status status-idle">Idle</div>
                </div>
                <div class="card-body">
                    <div class="activity-log">Ready to write...</div>
                </div>
                <div class="progress-bar"><div class="progress-fill"></div></div>
            </div>

            <!-- Optimizer -->
            <div class="card" id="agent-optimizer">
                <div class="card-header">
                    <div class="agent-info">
                        <h3>Agent Optimizer</h3>
                        <p>SEO Specialist</p>
                    </div>
                    <div class="agent-status status-idle">Idle</div>
                </div>
                <div class="card-body">
                    <div class="activity-log">Awaiting drafts...</div>
                </div>
                <div class="progress-bar"><div class="progress-fill"></div></div>
            </div>

            <!-- Director -->
            <div class="card" id="agent-director">
                <div class="card-header">
                    <div class="agent-info">
                        <h3>Agent Director</h3>
                        <p>Publishing & Systems</p>
                    </div>
                    <div class="agent-status status-idle">Idle</div>
                </div>
                <div class="card-body">
                    <div class="activity-log">Monitoring pipelines...</div>
                </div>
                <div class="progress-bar"><div class="progress-fill"></div></div>
            </div>
        </div>

        <div class="queue-section">
            <div class="queue-header">
                <h3>Process Queue</h3>
                <span class="timestamp" id="last-update">Last Update: Just Now</span>
            </div>
            <div id="queue-list">
                <div class="queue-item">
                    <div class="queue-item-info">
                        <h4>System Initialization</h4>
                        <p>Preparing swarm environment...</p>
                    </div>
                    <div class="agent-status status-thinking">Next</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                let state;
                try {
                    const response = await fetch('../swarm/state.json?t=' + Date.now());
                    if (response.ok) {
                        state = await response.json();
                    }
                } catch (e) {
                    console.warn('JSON fetch failed, falling back to JS state');
                }

                // Fallback to JS-loaded state if fetch failed
                if (!state) state = window.SWARM_STATE;
                if (!state) throw new Error("No state available");

                document.getElementById('system-status-text').innerText = 'System Operational';
                document.getElementById('system-status-dot').style.background = 'var(--success)';
                
                // Update Stats
                document.getElementById('stat-jobs').innerText = state.stats.jobs_processed;
                document.getElementById('stat-approved').innerText = state.stats.jobs_approved;
                document.getElementById('stat-blogs').innerText = state.stats.blogs_written;

                // Update Agents
                Object.keys(state.agents).forEach(id => {
                    const agent = state.agents[id];
                    const card = document.getElementById(`agent-${id}`);
                    if (card) {
                        const statusEl = card.querySelector('.agent-status');
                        statusEl.innerText = agent.status;
                        statusEl.className = `agent-status status-${agent.status.toLowerCase()}`;
                        
                        const logEl = card.querySelector('.activity-log');
                        logEl.innerText = agent.last_action || logEl.innerText;

                        const progressFill = card.querySelector('.progress-fill');
                        progressFill.style.width = agent.status === 'Active' ? '100%' : '0%';
                    }
                });

                // Update Queue
                const queueList = document.getElementById('queue-list');
                queueList.innerHTML = state.queue.length > 0 
                    ? state.queue.map(item => `
                        <div class="queue-item">
                            <div class="queue-item-info">
                                <h4>${item.task}</h4>
                                <p>${item.description}</p>
                            </div>
                            <div class="agent-status status-thinking">Queue</div>
                        </div>
                    `).join('')
                    : '<div class="queue-item"><p style="color: var(--text-dim)">No active tasks in queue.</p></div>';

                document.getElementById('last-update').innerText = `Last Update: ${new Date().toLocaleTimeString()}`;

            } catch (error) {
                console.error('Failed to fetch state:', error);
                document.getElementById('system-status-text').innerText = 'Connection Error';
                document.getElementById('system-status-dot').style.background = '#ff4444';
            }
        }

        setInterval(updateDashboard, 5000);
        updateDashboard();
    </script>
</body>
</html>
