<!doctype html>
<html lang="en-CA">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Us | MapleDevs</title>
  <meta name="description" content="Get in touch with MapleDevs for support, partnerships, or job posting inquiries.">
  <link rel="icon" href="../favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --maple: #c7352d;
      --maple-dark: #9f2822;
      --gold: #FFD600;
      --ink: #151515;
      --ink-soft: #40403c;
      --muted: #727168;
      --line: #dedbd5;
      --paper: #f7f5f0;
      --panel: #fffefa;
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: Inter, system-ui, sans-serif;
      line-height: 1.5;
    }
    .topbar { border-bottom: 1px solid var(--line); background: var(--panel); padding: 16px 24px; display: flex; justify-content: space-between; }
    .brand { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--ink); font-weight: 800; font-size: 1.1rem; }
    .brand img { width: 24px; border-radius: 4px; }
    .nav a { color: var(--ink-soft); text-decoration: none; font-size: 14px; font-weight: 600; padding: 8px 12px; }
    
    .hero { background: linear-gradient(135deg, #111820 0%, #17202b 55%, #1c242d 100%); color: #fff; padding: 60px 24px; text-align: center; }
    h1 { font-size: 3rem; margin: 0 0 16px 0; max-width: 800px; margin-left: auto; margin-right: auto; line-height: 1.2; }
    .subhead { font-size: 1.2rem; max-width: 600px; margin: 0 auto; color: rgba(255,255,255,0.8); }
    
    .content { max-width: 700px; margin: 60px auto; padding: 0 24px; }
    
    .post-form-container { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 40px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
    .form-grid { display: grid; gap: 20px; text-align: left; }
    .fg { display: flex; flex-direction: column; gap: 8px; }
    .fg label { font-weight: 600; color: var(--ink); font-size: 0.95rem; }
    .fg input[type="text"], .fg input[type="email"], .fg textarea { padding: 12px; border: 1px solid var(--line); border-radius: 8px; background: var(--paper); font-family: inherit; font-size: 1rem; color: var(--ink); }
    .fg input:focus, .fg textarea:focus { outline: 2px solid var(--maple); border-color: transparent; }
    .form-submit { margin-top: 10px; text-align: center; }
    .btn-p { display: inline-block; background: var(--maple); color: #fff; padding: 14px 28px; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; font-size: 1.05rem; }
    .btn-p:hover { background: var(--maple-dark); }
    .form-msg { margin-bottom: 20px; font-size: 1rem; display: none; }
    .form-msg.show { display: block; }
    .form-msg.err { color: var(--maple); }
    
    .contact-info { text-align: center; margin-top: 40px; color: var(--ink-soft); font-size: 1.1rem; }
    .contact-info a { color: var(--maple); text-decoration: underline; font-weight: 600; }
  </style>
<!-- Structured Data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Organization",
      "@id": "https://mapledevs.ca/#organization",
      "name": "MapleDevs",
      "url": "https://mapledevs.ca/",
      "logo": "https://mapledevs.ca/og-image.png",
      "sameAs": [
        "https://mapledevs.ca/"
      ]
    },
    {
      "@type": "WebSite",
      "@id": "https://mapledevs.ca/#website",
      "name": "MapleDevs",
      "url": "https://mapledevs.ca/",
      "publisher": {
        "@id": "https://mapledevs.ca/#organization"
      },
      "inLanguage": "en-CA"
    },
    {
      "@type": "WebPage",
      "@id": "https://mapledevs.ca/contact/#webpage",
      "name": "Contact Us | MapleDevs",
      "url": "https://mapledevs.ca/contact/",
      "isPartOf": {
        "@id": "https://mapledevs.ca/#website"
      },
      "inLanguage": "en-CA"
    }
  ]
}
</script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="../index.html">
      <img src="../favicon.png" alt="">
      MapleDevs
    </a>
    <nav class="nav">
      <a href="../index.html">← Back to Jobs</a>
    </nav>
  </header>
  
  <section class="hero">
    <h1>Contact Us</h1>
    <p class="subhead">Have a question about MapleDevs? Need to update a job listing or explore a partnership? We're here to help.</p>
  </section>
  
  <section class="content">
    <div class="post-form-container">
      <form id="contact-form" class="form-grid" onsubmit="return submitContactForm(event)">
        <!-- Honeypot for spam -->
        <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off">
        <input type="hidden" name="_subject" value="[MapleDevs] New Contact Form Message">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_captcha" value="false">

        <div class="fg">
          <label>Your Name <span class="req">*</span></label>
          <input type="text" name="Name" required placeholder="John Doe">
        </div>
        <div class="fg">
          <label>Your Email <span class="req">*</span></label>
          <input type="email" name="Email" required placeholder="john@example.com">
        </div>
        <div class="fg">
          <label>Subject</label>
          <input type="text" name="Subject" placeholder="e.g. Update Job Listing">
        </div>
        <div class="fg">
          <label>Message <span class="req">*</span></label>
          <textarea name="Message" required placeholder="How can we help you?" rows="6"></textarea>
        </div>
        
        <div class="form-submit">
          <div class="form-msg" id="contact-msg"></div>
          <button type="submit" class="btn-p" id="contact-submit-btn">Send Message</button>
        </div>
      </form>
    </div>
    
    <div class="contact-info">
      <p>Or email us directly at <br> <a href="mailto:mapledevsbusiness@gmail.com">mapledevsbusiness@gmail.com</a></p>
    </div>
  </section>

  <script>
    function submitContactForm(e){
      e.preventDefault();
      const form=document.getElementById('contact-form');
      const btn=document.getElementById('contact-submit-btn');
      const msg=document.getElementById('contact-msg');
      btn.disabled=true; btn.textContent='Sending…';
      msg.className='form-msg'; msg.style.display='none';

      const data=new FormData(form);
      fetch('https://formsubmit.co/ajax/mapledevsbusiness@gmail.com',{
        method:'POST',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body:JSON.stringify(Object.fromEntries(data))
      }).then(r=>r.json()).then(d=>{
        if(d.success){
          msg.className='form-msg show'; 
          msg.innerHTML = '<div class="success-box" style="background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:24px;text-align:center;"><b>✅ Message sent successfully!</b><p style="margin:12px 0 0;">We will get back to you as soon as possible.</p></div>';
          form.reset();
        } else { throw 0; }
      }).catch(()=>{
        msg.className='form-msg show err'; msg.innerHTML='⚠ Error — please email mapledevsbusiness@gmail.com directly.';
      }).finally(()=>{
        btn.disabled=false; btn.textContent='Send Message';
      });
      return false;
    }
  </script>
</body>
</html>
