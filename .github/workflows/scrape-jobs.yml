name: MapleDevs Master Automation

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  automation-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.x

      - name: Install dependencies
        run: |
          npm install
          npm install axios

      - name: Scrape Jobs & Update Sheet
        continue-on-error: true
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
        run: node scrape-jobs.js

      - name: Build SEO Pages
        continue-on-error: true
        run: node build-seo.js

      - name: Google Indexing
        continue-on-error: true
        env:
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
        run: node google-index.js

      - name: Generate Email Digest
        continue-on-error: true
        run: node generate-digest.js

      - name: Post to LinkedIn
        continue-on-error: true
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
        run: node post-linkedin.js

      - name: Run Swarm Intelligence
        continue-on-error: true
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node swarm_manager.js


      - name: Prepare Website Files
        run: |
          mkdir -p dist
          # 1. Copy core website files
          cp index.html dist/ || true
          cp sitemap.xml dist/ || true
          cp robots.txt dist/ || true
          cp og-image.png dist/ || true
          cp favicon.png dist/ || true
          cp favicon.ico dist/ || true
          cp CNAME dist/ || true
          cp -r css dist/ || true
          cp -r assets dist/ || true
          cp -r js dist/ || true
          cp -r jobs dist/ || true
          
          # 2. Copy all SEO Hub folders (folders created by the build-seo script)
          # This looks for folders like /vancouver, /art, /programming and copies them
          for dir in vancouver toronto montreal ottawa quebec-city edmonton calgary victoria london halifax kitchener burnaby programming art design producer qa audio ui-ux junior remote internship about studios saved blog account talent admin swarm; do
            if [ -d "$dir" ]; then
              cp -r "$dir" dist/
            fi
          done

      - name: Push to Website
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.WEBSITE_PUSH_PAT }}
        with:
          source-directory: 'dist'
          destination-github-username: 'TheDudoe'
          destination-repository-name: 'MapleDevs'
          user-email: mapledevsbusiness@gmail.com
          target-branch: main
