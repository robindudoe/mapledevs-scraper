
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | MapleDevs Editorial</title>
    <meta name="description" content="{{META_DESCRIPTION}}">
    <meta property="og:site_name" content="MapleDevs">
    <meta property="og:title" content="{{TITLE}}">
    <meta property="og:description" content="{{META_DESCRIPTION}}">
    <meta property="og:type" content="article">
    <meta property="og:image" content="https://mapledevs.ca/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{TITLE}}">
    <meta name="twitter:description" content="{{META_DESCRIPTION}}">
    <meta name="twitter:image" content="https://mapledevs.ca/og-image.png">
    
    <!-- Using MapleDevs Branded Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --maple: #C8372D;
            --maple-dark: #A02820;
            --maple-gradient: linear-gradient(135deg, #C8372D 0%, #E8564C 100%);
            --bg: #F8F7F4;
            --card-bg: #FFFFFF;
            --text: #111110;
            --text-dim: #4A4A45;
            --border: rgba(17, 17, 16, 0.07);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg: #0A0A09;
            --card-bg: #151514;
            --text: #FFFFFF;
            --text-dim: #8A8A82;
            --border: rgba(255, 255, 255, 0.08);
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.7; 
            margin: 0; 
            padding: 0; 
            -webkit-font-smoothing: antialiased;
            transition: background var(--transition), color var(--transition);
        }
        
        .container { max-width: 840px; margin: 0 auto; padding: 56px 24px; }
        
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }
        
        .back-link { 
            color: var(--maple); 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 600; 
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-link:hover { text-decoration: underline; }

        header { 
            margin-bottom: 48px; 
            padding-bottom: 28px;
            border-bottom: 1px solid var(--border);
        }
        
        h1 { 
            font-family: 'DM Serif Display', serif;
            font-size: 42px; 
            color: var(--text); 
            margin: 0 0 16px 0; 
            line-height: 1.15;
            font-weight: 400;
        }
        
        .metadata {
            color: var(--text-dim);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .article-content { 
            max-width: 760px;
            font-size: 18px; 
        }
        
        .article-content p { margin-bottom: 24px; }
        .article-content ul, .article-content ol { margin: 0 0 24px 24px; }
        .article-content li { margin-bottom: 10px; }
        
        .article-content h2 { 
            font-family: 'DM Serif Display', serif;
            font-size: 28px; 
            color: var(--text); 
            margin: 48px 0 20px 0; 
            font-weight: 400;
        }
        
        .article-content a { color: var(--maple); text-decoration: underline; }
        .article-content blockquote {
            margin: 32px 0;
            padding: 20px 24px;
            border-left: 4px solid var(--maple);
            background: var(--card-bg);
            color: var(--text-dim);
        }

        .sources {
            margin-top: 60px;
            padding: 32px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: background var(--transition);
        }
        
        .sources h3 { margin-top: 0; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
        .sources ul { padding-left: 20px; margin: 0; }
        .sources li { font-size: 14px; color: var(--text-dim); margin-bottom: 8px; }

        /* Theme Toggle Button */
        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        .theme-toggle:hover {
            border-color: var(--maple);
            transform: rotate(15deg);
        }

        footer { 
            margin-top: 80px; 
            padding-top: 32px; 
            border-top: 1px solid var(--border); 
            color: var(--text-dim); 
            font-size: 13px; 
            text-align: center; 
        }

        @media (max-width: 640px) {
            .container { padding: 36px 18px; }
            .nav-header { margin-bottom: 42px; }
            h1 { font-size: 34px; }
            .metadata { flex-wrap: wrap; }
            .article-content { font-size: 16px; }
            .sources { padding: 24px; }
        }

        /* Professional Maple Feed article refresh */
        :root {
            --maple: #d83b2e;
            --maple-dark: #b92f25;
            --maple-gradient: linear-gradient(135deg, #d83b2e 0%, #f05a47 100%);
            --bg: #f4f6f9;
            --card-bg: #ffffff;
            --text: #12151b;
            --text-dim: #647080;
            --border: rgba(18, 21, 27, 0.12);
        }

        [data-theme="dark"] {
            --bg: #101318;
            --card-bg: #171b22;
            --text: #f5f7fb;
            --text-dim: #9ca7b7;
            --border: rgba(255, 255, 255, 0.12);
        }

        body {
            background:
                linear-gradient(135deg, rgba(216, 59, 46, 0.08), transparent 34%),
                var(--bg);
            letter-spacing: 0;
        }

        .container {
            max-width: 980px;
            padding: 40px 24px 72px;
        }

        .nav-header {
            position: sticky;
            top: 0;
            z-index: 5;
            margin-bottom: 44px;
            padding: 12px 0;
            background: color-mix(in srgb, var(--bg) 88%, transparent);
            backdrop-filter: blur(16px);
        }

        .back-link {
            color: var(--text-dim);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 10px;
        }

        .back-link:hover {
            color: var(--maple);
            text-decoration: none;
            border-color: rgba(216, 59, 46, 0.32);
        }

        header {
            max-width: 860px;
            margin-bottom: 36px;
            padding-bottom: 24px;
        }

        h1,
        .article-content h2 {
            font-family: 'Inter', sans-serif;
            letter-spacing: 0;
        }

        h1 {
            font-size: clamp(2.25rem, 5vw, 4.7rem);
            line-height: 1;
            font-weight: 850;
        }

        .article-content {
            max-width: 800px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: clamp(24px, 4vw, 48px);
            box-shadow: 0 14px 38px rgba(18, 21, 27, 0.08);
        }

        .article-content h2 {
            font-weight: 800;
            line-height: 1.15;
        }

        .article-content p,
        .article-content li {
            color: color-mix(in srgb, var(--text) 84%, var(--text-dim));
        }

        .theme-toggle {
            border-radius: 6px;
        }

        @media (max-width: 640px) {
            .container { padding: 28px 16px 56px; }
            .article-content { padding: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-header">
            <a href="/blog/index.html" class="back-link">Back to The Maple Feed</a>
            <div style="display: flex; align-items: center; gap: 16px;">
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
                    <svg id="theme-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></svg>
                </button>
                <img src="/favicon.png" alt="MapleDevs" style="height: 20px; opacity: 0.8;">
            </div>
        </div>

        <header>
            <h1>{{TITLE}}</h1>
            <div class="metadata">
                <span style="color: var(--maple)">MapleDevs Editorial</span>
                <span>|</span>
                <span>{{DATE}}</span>
            </div>
        </header>

        <article class="article-content">
            {{CONTENT}}
        </article>

        <footer id="editorial-footer">
            (c) 2026 MapleDevs. Verified Canadian Game Industry Insights.
        </footer>
    </div>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const html = document.documentElement;

        const sunIcon = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
        const moonIcon = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;

        function setTheme(theme) {
            html.setAttribute('data-theme', theme);
            localStorage.setItem('maple-theme', theme);
            themeIcon.innerHTML = theme === 'dark' ? sunIcon : moonIcon;
        }

        // Initialize theme
        const savedTheme = localStorage.getItem('maple-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        setTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });
    </script>
</body>
</html>
